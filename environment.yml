name: dockexplain

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - matplotlib

  # Chemistry / molecular modeling
  - rdkit
  - openbabel
  - openmm
  - pdbfixer
  - fpocket
  - autodock-vina

  # Structure / analysis
  - mdanalysis
  - prolif
  - gemmi

  # PDF / rendering basics
  - reportlab
  - pillow

  # Web server basics
  - flask
  - gunicorn
  - requests
  - beautifulsoup4
  - lxml
  - tqdm
  - psutil

  - pip:
      - meeko==0.7.1
      - ollama==0.6.1
      - ddgs==9.14.1
      - duckduckgo-search==8.1.1
      - PubChemPy==1.0.5
      - python-dotenv==1.2.2
